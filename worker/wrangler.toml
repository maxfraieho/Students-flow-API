name = "studentflow-api-gateway"
main = "worker.js"
compatibility_date = "2025-01-01"

[vars]
# Публічний HTTPS-URL вашого cloudflared-тунелю → порт 8050 на Pi.
# Приклад: "https://your-subdomain.trycloudflare.com"
# Або ваш власний домен, прив'язаний через cloudflared.
TUNNEL_URL = "https://your-pi-tunnel.example.com"

# Origin вашого Lovable-фронтенду (без слешу в кінці).
# Приклад: "https://your-app.lovable.app"
FRONTEND_URL = "https://your-lovable-app.lovable.app"

# OPERATOR_TOKEN — це SECRET, НЕ додавайте його сюди.
# Dashboard: Workers → studentflow-api-gateway → Settings → Variables → Secret Variables
